{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IELTS Platform</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{% static 'ielts/css/ielts.css' %}">
</head>

<body>

<!-- 🔝 NAVBAR -->
<nav class="navbar navbar-expand-lg px-4">
    <div class="container-fluid">

        <!-- LEFT SIDE -->
        <ul class="navbar-nav me-auto align-items-center gap-3">

            <li class="nav-item">
                <a class="nav-link" href="{% url 'ielts:home' %}">IELTS</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="{% url 'ielts:reading' %}">Reading</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">Listening</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">Writing</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#">Speaking</a>
            </li>

        </ul>

        <!-- RIGHT SIDE -->
        <ul class="navbar-nav align-items-center gap-3">

            {% if user.is_authenticated %}
                <li class="nav-item">
                    <span class="text-white">Hi, {{ user.username }}</span>
                </li>
                <li class="nav-item">
                    <a href="{% url 'logout' %}" class="btn btn-sm btn-danger">
                        Logout
                    </a>
                </li>
            {% else %}
                <li class="nav-item">
                    <a href="{% url 'login' %}" class="btn btn-sm btn-light">
                        Login
                    </a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'register' %}" class="btn btn-sm btn-success">
                        Register
                    </a>
                </li>
            {% endif %}

        </ul>

    </div>
</nav>

<!-- 📦 MAIN CONTENT -->
<main class="content-wrapper">
    {% block content %}
    {% endblock %}
</main>

<!-- FOOTER -->
<footer class="text-center text-white mt-5 mb-3" style="opacity: 0.6;">
    <small>© TestBridge IELTS Platform</small>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JS -->
<script src="{% static 'ielts/js/ielts.js' %}"></script>

</body>
</html>
