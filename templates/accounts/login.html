{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | TestBridge</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS (reuse IELTS style if you want consistency) -->
    <link rel="stylesheet" href="{% static 'ielts/css/ielts.css' %}">
</head>

<body class="d-flex align-items-center justify-content-center" style="height:100vh;">

<div class="card-custom" style="width: 400px;">

    <h3 class="text-center mb-4">Login</h3>

    <form method="POST">
        {% csrf_token %}

        <!-- Username -->
        <div class="mb-3">
            <label>Username</label>
            <input type="text" name="username" class="form-control" required>
        </div>

        <!-- Password -->
        <div class="mb-3">
            <label>Password</label>
            <input type="password" name="password" class="form-control" required>
        </div>

        <!-- Button -->
        <button type="submit" class="main-btn w-100">
            Login
        </button>
    {% if form.errors %}
        <div class="alert alert-danger">
            {{ form.errors }}
        </div>
    {% endif %}


    </form>

    <p class="text-center mt-3">
        Don’t have an account?
        <a href="{% url 'register' %}">Register</a>
    </p>

</div>

</body>
</html>
